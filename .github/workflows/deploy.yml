name: Build & Deploy

on:
  push:
    branches:
      - main

# Need write access to push to deploy branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: npm run build

    # Push built files to 'deploy' branch for Hostinger Git deployment
    - name: Deploy to deploy branch
      run: |
        cd dist
        git init
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -A
        git commit -m "Deploy: ${{ github.sha }}"
        git push --force https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:deploy
